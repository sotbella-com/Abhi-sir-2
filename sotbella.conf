# Nginx configuration for Sotbella on AWS EC2
# Place this file at: /etc/nginx/sites-available/sotbella

server {
    listen 80;
    server_name cyntest.sotbella360.com;  # Cloudflare proxified domain
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # Content Security Policy - Configured for Evergage/MCP beacon
    # Includes 'unsafe-eval' and all required Evergage domains
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.evgnet.com https://*.evergage.com https://www.googletagmanager.com https://www.google-analytics.com https://js.stripe.com https://static.cloudflareinsights.com; worker-src 'self' data: https://*.evergage.com 'unsafe-eval'; connect-src 'self' https://cdn.evgnet.com https://*.evergage.com https://*.commercecloud.salesforce.com https://www.google-analytics.com https://www.googletagmanager.com; img-src 'self' data: blob: https: https://*.evergage.com; font-src 'self' data: https://fonts.gstatic.com https://*.evergage.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.evergage.com; frame-src 'self' https://www.googletagmanager.com https://js.stripe.com;" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript;
    
    # Main application
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # SFCC API proxy
    location /sfcc/ {
        proxy_pass https://dyp4l3dm.api.commercecloud.salesforce.com/;
        proxy_set_header Host dyp4l3dm.api.commercecloud.salesforce.com;
        proxy_ssl_server_name on;
        proxy_ssl_name dyp4l3dm.api.commercecloud.salesforce.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
    }
    
    # Image proxy for stgsfcc.sotbella.com
    location /stgsfcc/ {
        proxy_pass https://stgsfcc.sotbella.com/;
        proxy_set_header Host stgsfcc.sotbella.com;
        proxy_ssl_server_name on;
        proxy_ssl_name stgsfcc.sotbella.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        
        # Cache images for better performance
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
    
    # Static image proxy
    location /proxy-images/ {
        proxy_pass https://stgsfcc.sotbella.com/on/demandware.static/-/Sites-sotbella_in-Library/default/;
        proxy_set_header Host stgsfcc.sotbella.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        
        # Cache images for better performance
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri @fallback;
    }
    
    # Fallback for SPA
    location @fallback {
        proxy_pass http://localhost:3000;
    }
}

# SSL handled by Cloudflare (no need for local SSL)
